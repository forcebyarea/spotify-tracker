name: Spotify Follower Tracker

on:
  schedule:
    - cron: '30 1 * * *'  # 1:30 AM UTC = 7:00 AM IST daily
  workflow_dispatch:

jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -u scraper.py
        env:
          SPOTIFY_CREDENTIALS: ${{ secrets.SPOTIFY_CREDENTIALS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_IDS: ${{ secrets.SHEET_IDS }}
          SHEET_INDICES: '[0,2,3]'
          KEY_INDEX: '0'
          START_DELAY: '0'

  job-2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
