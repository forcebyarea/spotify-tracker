name: Daily Spotify Tracker

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 3:00 AM UTC = 8:30 AM IST
    - cron: "0 2 * * 0"   # every Sunday at 2:00 AM UTC = discover new playlists
  workflow_dispatch:
    inputs:
      run_discoverer:
        description: 'Also run playlist discoverer? (yes/no)'
        required: false
        default: 'no'

jobs:
  discover:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * 0' || github.event.inputs.run_discoverer == 'yes'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Discover playlists from profiles
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python get_playlists_from_profile.py

  scrape:
    runs-on: ubuntu-latest
    needs: discover
    if: always()
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Scrape follower counts
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scraper.py
