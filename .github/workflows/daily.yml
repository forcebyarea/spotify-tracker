name: Daily Spotify Tracker

on:
  schedule:
    - cron: "0 3 * * *"    # scraper — every day 3:00 AM UTC
    - cron: "0 2 * * 0"    # discoverer — every Sunday 2:00 AM UTC
  workflow_dispatch:
    inputs:
      run_discoverer:
        description: 'Run playlist discoverer? (yes/no)'
        required: false
        default: 'no'

jobs:

  discover:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * 0' || github.event.inputs.run_discoverer == 'yes'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Install Playwright system deps (Ubuntu 24.04 fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libgbm1 libgtk-3-0 \
            libnspr4 libnss3 libxcomposite1 libxdamage1 \
            libxfixes3 libxkbcommon0 libxrandr2 xvfb
      - name: Install Playwright browser
        run: playwright install chromium
      - name: Run playlist discoverer
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPOTIFY_EMAIL: ${{ secrets.SPOTIFY_EMAIL }}
          SPOTIFY_PASSWORD: ${{ secrets.SPOTIFY_PASSWORD }}
        run: python playlist_discoverer.py

  scrape:
    runs-on: ubuntu-latest
    needs: discover
    if: always()
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run follower tracker
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: python scraper.py
