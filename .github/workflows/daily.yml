name: Daily Spotify Tracker

on:
  schedule:
    # Runs every day at 3:00 AM UTC = 8:30 AM India time
    # To change time, use crontab.guru website to generate your own schedule
    - cron: "0 3 * * *"

  # This lets you also run it manually from GitHub website anytime
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Spotify scraper
        env:
        - name: Run scraper
- name: Run scraper
  run: python scraper.py
  env:
    SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
    SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
    GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          
        
