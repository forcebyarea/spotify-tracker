name: Test API Keys

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python -u test_keys.py
        env:
          SPOTIFY_CREDENTIALS: ${{ secrets.SPOTIFY_CREDENTIALS }}
